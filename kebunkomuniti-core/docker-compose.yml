version: '3.8'

services:
  gateway:
    image: nginx:alpine
    container_name: kebunkomuniti-gateway
    ports:
      - "80:80"
    volumes:
      - ./gateway-nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./gateway-nginx/logs:/var/log/nginx
    depends_on:
      - service-ai
      - service-inventory
    networks:
      - kebunkomuniti-network
    restart: always

  service-ai:
    build:
      context: ./service-ai
      dockerfile: Dockerfile
    container_name: kebunkomuniti-ai
    env_file:
      - .env
    networks:
      - kebunkomuniti-network
    restart: always

  service-inventory:
    build:
      context: ./service-inventory
      dockerfile: Dockerfile
    container_name: kebunkomuniti-inventory
    env_file:
      - .env
    networks:
      - kebunkomuniti-network
    restart: always

networks:
  kebunkomuniti-network:
    driver: bridge
